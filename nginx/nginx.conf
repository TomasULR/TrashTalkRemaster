worker_processes auto;
events {
    worker_connections 4096;
}

http {
    # Docker embedded DNS — re-resolves upstream names dynamically after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # Pro WebSocket: nepouštíme aplikační connection close, držíme dlouho.
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # Soubory: 1 GiB upload limit per request
    client_max_body_size 1024m;
    client_body_buffer_size 128k;
    proxy_request_buffering off;        # streamování uploads do app

    # Gzip pro REST JSON
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # Mapování pro WebSocket Upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # =====================================================
    # Single TLS endpoint na 25565 — všechny služby přes path routing
    # =====================================================
    server {
        listen 25565 ssl;
        listen [::]:25565 ssl;
        http2 on;

        # Self-signed pro dev; v produkci nahradit Let's Encrypt certem
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Bezpečnostní hlavičky
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proměnná nutí nginx re-resolvovat DNS při každém requestu (valid=10s výše)
        # místo cachování IP při startu — kritické pro Docker container restarts
        set $app_upstream http://app:8080;

        # ----------- REST API -----------
        location /api/ {
            proxy_pass $app_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }

        # ----------- WebSocket: signaling (text chat, presence, control) -----------
        location /ws/signal {
            proxy_pass $app_upstream/ws/signal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ----------- WebSocket: media bridge (binární RTP-like rámce) -----------
        location ~ ^/ws/media/.+ {
            proxy_pass $app_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Real-time média — žádné bufferování
            proxy_buffering off;
            proxy_request_buffering off;
            tcp_nodelay on;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ----------- File service (uploads / downloads) -----------
        location /files/ {
            proxy_pass $app_upstream/files/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Streamování velkých uploadů a downloadů
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # Range requests pro download
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
        }

        # ----------- Default deny -----------
        location / {
            return 404;
        }
    }
}
