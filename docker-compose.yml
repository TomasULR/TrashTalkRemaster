services:
  postgres:
    image: postgres:16-alpine
    container_name: trashtalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trashtalk
      POSTGRES_USER: trashtalk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trashtalk}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trashtalk -d trashtalk"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trashtalk-net

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: trashtalk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-trashtalk}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-trashtalk-secret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - trashtalk-net

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: trashtalk-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-trashtalk} ${MINIO_ROOT_PASSWORD:-trashtalk-secret};
        mc mb -p local/trashtalk-files || true;
        mc anonymous set none local/trashtalk-files;
        echo 'MinIO bucket ready';
      "
    networks:
      - trashtalk-net

  app:
    build:
      context: ./backend
    container_name: trashtalk-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TRASHTALK_DB_URL: jdbc:postgresql://postgres:5432/trashtalk
      TRASHTALK_DB_USER: trashtalk
      TRASHTALK_DB_PASSWORD: ${POSTGRES_PASSWORD:-trashtalk}
      TRASHTALK_MINIO_ENDPOINT: http://minio:9000
      TRASHTALK_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-trashtalk}
      TRASHTALK_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-trashtalk-secret}
      TRASHTALK_MINIO_BUCKET: trashtalk-files
      TRASHTALK_JWT_PRIVATE_KEY: /secrets/jwt_private.pem
      TRASHTALK_JWT_PUBLIC_KEY: /secrets/jwt_public.pem
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - trashtalk-net

  nginx:
    image: nginx:1.27-alpine
    container_name: trashtalk-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "25565:25565"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - trashtalk-net

volumes:
  postgres-data:
  minio-data:

networks:
  trashtalk-net:
    driver: bridge

